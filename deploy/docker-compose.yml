services:
  restate:
    # ghcr.io mirror avoids Docker Hub anonymous pull rate limits.
    image: ghcr.io/restatedev/restate:latest
    ports:
      - "8080:8080"   # ingress (invoke handlers)
      - "9070:9070"   # admin (register deployments)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI / trace query API
      - "4317:4317"    # OTLP gRPC ingest

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"   # HTTP interface (audit analytics sink)
    environment:
      CLICKHOUSE_USER: aep
      CLICKHOUSE_PASSWORD: aep
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
